<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXIOM Studio Engine</title>
    <meta name="description" content="AXIOM Studio — AI-Powered Design, Presentation, and 3D Creation Platform" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      html[data-theme="dark"] body { background: #050507; color: #f0f0f5; }
      html[data-theme="light"] body { background: #f5f5f7; color: #1d1d1f; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      html[data-theme="light"] ::-webkit-scrollbar-thumb { background: #bbb; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      input, textarea, select, button { font-family: inherit; }
      ::selection { background: #7928CA40; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
